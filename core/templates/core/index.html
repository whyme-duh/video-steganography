{% load static %}
<html>

<head>
  <title>{% block title%}Camouflage{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<body>
  <nav class="container">
    <div class="logo">
      <img src="/media/icons/logo.png">
    </div>
    <ul class="nav-bar">
      <li><a href="{%url 'home' %}">Home</a></li>
      <li><a href="{%url 'encode' %}">Video Steganography</a></li>
      <li><a href="{%url 'decode' %}">Video Decode</a></li>
      <li> <a href="{%url 'aboutus' %}">About</a></li>
    </ul>
  </nav>
  {% if messages %}
  <div class="message-container container">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }} w-50">
      {{ msg }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
  <main class="container">
  {% block content %} {% endblock%}
  </main>
  <footer>
    <div class="footer">
      <div class="footer_about">
        <h1>Camouflage</h1>
        <p>Hide yout message in plain sight.</p>
      </div>
      
      <div class="socials">
        <h1>FOLLOW US:</h1>
        <a href="#" class="fa fa-facebook"></a>
        <a href="#" class="fa fa-instagram"></a>
        <a href="#" class="fa fa-linkedin"></a>
      </div>
    </div>
  </footer>
  <script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const messageContainer = document.getElementById('message-container');
            if (messageContainer) {
                messageContainer.style.display = 'none';
            }
        }, 3000); // 3000 milliseconds = 3 seconds
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
    integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
    crossorigin="anonymous"></script>
  <script src="{% static 'index.js'%}"></script>

</body>

</html>
